<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bzex Torrent Selector</title>
    <link rel="icon" href="https://cdn.jsdelivr.net/npm/@googledrive/index@2.2.3/images/favicon.ico">
    
    <!-- Bootstrap Base -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-tertiary: #666666;
            --accent-primary: #3b82f6;
            --accent-secondary: #10b981;
            --accent-danger: #ef4444;
            --accent-warning: #f59e0b;
            --accent-purple: #8b5cf6;
            --border-subtle: #2a2a2a;
            --border-muted: #404040;
            --hover-bg: #1f1f1f;
        }

        * {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            font-weight: 400;
        }

        /* Navigation - Elegant and minimal */
        .navbar {
            background: rgba(20, 20, 20, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            box-shadow: 0 1px 0 0 rgba(255, 255, 255, 0.05);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--text-primary) !important;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-text {
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--text-primary);
            letter-spacing: 2px;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .brand-subtitle {
            font-size: 0.85rem;
            font-weight: 300;
            color: var(--text-secondary);
            margin-left: 6px;
            text-transform: lowercase;
            letter-spacing: 0.5px;
        }

        .navbar-brand:hover .brand-text {
            color: var(--accent-primary);
        }

        .navbar-brand:hover .brand-subtitle {
            color: var(--text-primary);
        }

        /* Elegant Cards and Containers */
        .alert {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-primary) !important;
            padding: 1.25rem;
            margin-bottom: 1.5rem;
        }

        /* Refined File Items */
        .file-item {
            background: var(--bg-secondary) !important;
            border: 1px solid var(--border-subtle) !important;
            border-radius: 12px !important;
            margin-bottom: 0.75rem;
            padding: 1.25rem !important;
            color: var(--text-primary) !important;
        }

        .file-item:hover {
            background: var(--hover-bg) !important;
            border-color: var(--border-muted) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px -8px rgba(0, 0, 0, 0.5);
        }

        .file-icon {
            font-size: 1.75rem;
            margin-right: 1rem;
            opacity: 0.9;
        }

        .folder-icon { 
            color: var(--accent-warning);
        }
        .file-default-icon { 
            color: var(--accent-primary);
        }

        /* Elegant Typography */
        h6 {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            letter-spacing: 0.25px;
        }

        .text-muted {
            color: var(--text-secondary) !important;
            font-size: 0.875rem;
            font-weight: 300;
        }

        .accent-text {
            color: var(--accent-primary);
            font-weight: 500;
        }

        /* Refined Buttons */
        .btn {
            border-radius: 8px;
            font-weight: 400;
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            border-width: 1px;
        }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.8rem;
        }

        .btn-outline-light {
            background: transparent;
            border: 1px solid var(--border-muted);
            color: var(--text-secondary);
        }

        .btn-outline-light:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .btn-outline-info { 
            background: transparent;
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
        }
        
        .btn-outline-info:hover {
            background: var(--accent-primary);
            color: white;
        }

        .btn-outline-success { 
            background: transparent;
            border: 1px solid var(--accent-secondary);
            color: var(--accent-secondary);
        }
        
        .btn-outline-success:hover {
            background: var(--accent-secondary);
            color: white;
        }

        .btn-outline-secondary { 
            background: transparent;
            border: 1px solid var(--text-tertiary);
            color: var(--text-tertiary);
        }

        .btn-outline-secondary:hover {
            background: var(--text-tertiary);
            color: var(--bg-primary);
        }

        .btn-danger {
            background: var(--accent-danger);
            border: 1px solid var(--accent-danger);
            color: white;
            font-weight: 500;
        }

        .btn-danger:hover {
            background: transparent;
            color: var(--accent-danger);
            border-color: var(--accent-danger);
        }

        /* Elegant Form Controls */
        .form-control {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 300;
            padding: 0.75rem 1rem;
        }

        .form-control:focus {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            color: var(--text-primary);
        }

        .form-control::placeholder {
            color: var(--text-tertiary);
            font-weight: 300;
        }

        /* Sophisticated Footer */
        footer {
            background: rgba(20, 20, 20, 0.95) !important;
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-subtle);
        }

        footer p {
            font-size: 0.875rem;
            font-weight: 300;
            color: var(--text-secondary);
        }

        /* Pin Entry Styles */
        .pin-entry {
            max-width: 400px;
            margin: 2rem auto;
            animation: fadeIn 0.5s;
        }

        .pin-entry.fadeOut {
            animation: fadeOut 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: var(--text-primary);
            margin: 10% auto;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Selection Controls */
        .selection-controls {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        /* Checkbox styling */
        .form-check-input {
            background-color: var(--bg-tertiary);
            border-color: var(--border-muted);
            margin-right: 0.75rem;
        }

        .form-check-input:checked {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .form-check-input:focus {
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }

        /* Elegant hover states */
        .file-item:hover .file-icon {
            transform: scale(1.05);
        }

        .file-item:hover h6 {
            color: var(--accent-primary);
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .brand-text {
                font-size: 1.8rem;
            }
            
            .selection-controls {
                padding: 1rem;
            }
            
            .btn-group-mobile {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .btn-group-mobile .btn {
                width: 100%;
            }
        }

        /* Container spacing */
        .container {
            max-width: 1200px;
        }

        /* Refined spacing */
        main {
            padding-bottom: 120px;
        }
    </style>
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <span class="brand-text">Bzex</span>
                    <span class="brand-subtitle">Torrent Selector</span>
                </a>
            </div>
        </nav>
    </header>

    <main style="padding-top: 100px;">
        <div class="container">
            <!-- PIN Entry -->
            <div id="pinEntry" class="pin-entry">
                <div class="alert text-center" role="alert">
                    <i class="bi bi-shield-lock me-3" style="color: var(--accent-primary); opacity: 0.8; font-size: 2rem;"></i>
                    <h4 class="mb-3">Enter PIN to Access Torrent</h4>
                    <p class="text-muted mb-4">Enter the PIN code you received from Telegram</p>
                    <div class="d-flex flex-column align-items-center gap-3">
                        <input type="text" id="pinInput" class="form-control text-center" 
                               placeholder="Enter PIN" style="max-width: 200px; font-size: 1.1rem; letter-spacing: 0.2em;">
                        <button id="submitPin" class="btn btn-danger">
                            <i class="bi bi-unlock me-2"></i>Submit
                        </button>
                    </div>
                </div>
            </div>

            <!-- File Manager -->
            <div id="fileManager" class="d-none">
                <!-- Selection Controls -->
                <div class="selection-controls">
                    <div class="row align-items-center mb-3">
                        <div class="col-md-6">
                            <div class="d-flex flex-wrap gap-2">
                                <button id="selectAllBtn" class="btn btn-outline-info btn-sm">
                                    <i class="bi bi-check-square me-1"></i>Select All
                                </button>
                                <button id="invertSelectionBtn" class="btn btn-outline-secondary btn-sm">
                                    <i class="bi bi-arrow-repeat me-1"></i>Invert
                                </button>
                                <button id="selectEverythingBtn" class="btn btn-outline-success btn-sm">
                                    <i class="bi bi-check-all me-1"></i>Select Everything
                                </button>
                            </div>
                        </div>
                        <div class="col-md-6 text-md-end mt-2 mt-md-0">
                            <button id="submitBtn" class="btn btn-danger">
                                <i class="bi bi-check-circle me-2"></i>Submit Selection
                            </button>
                        </div>
                    </div>
                    
                    <!-- Statistics -->
                    <div class="alert text-center mb-0" role="alert">
                        <div class="row">
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">Selected Files</div>
                                <div class="accent-text fw-semibold">
                                    <span id="selectedCount">0</span> / <span id="totalCount">0</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">Total Size</div>
                                <div class="accent-text fw-semibold">
                                    <span id="selectedSize">0 B</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">Available Size</div>
                                <div class="fw-semibold" style="color: var(--text-secondary);">
                                    <span id="totalSize">0 B</span>
                                </div>
                            </div>
                            <div class="col-6 col-md-3">
                                <div class="text-muted small">Progress</div>
                                <div class="fw-semibold" style="color: var(--accent-secondary);">
                                    <span id="selectionProgress">0%</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- File List -->
                <div id="fileTree" class="list-group"></div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto py-3" style="position: fixed; left: 0; bottom: 0; width: 100%; z-index: 9999;">
        <div class="container">
            <div class="text-center">
                <p class="mb-1">
                    <i class="bi bi-heart-fill me-1" style="color: var(--accent-danger);"></i>
                    Made with love by 
                    <a href="https://t.me/MirrorLeechGroupz" target="_blank">Bzex</a>
                </p>
                <p class="mb-2">
                    © 2025 <a href="#" target="_blank">Bzex Torrent Selector</a>
                </p>
                <a href="#" class="btn btn-outline-light btn-sm" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                    <i class="bi bi-arrow-up"></i> Top
                </a>
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div id="reusableModal" class="modal">
        <div class="modal-content">
            <h4 id="modalTitle" class="mb-3"></h4>
            <div id="modalBody"></div>
            <div id="modalFooter" class="mt-4 text-end"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // DOM Elements
        const fileTree = document.getElementById('fileTree');
        const selectedCount = document.getElementById('selectedCount');
        const totalCount = document.getElementById('totalCount');
        const selectedSize = document.getElementById('selectedSize');
        const totalSize = document.getElementById('totalSize');
        const selectionProgress = document.getElementById('selectionProgress');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const submitBtn = document.getElementById('submitBtn');
        const pinEntry = document.getElementById('pinEntry');
        const pinInput = document.getElementById('pinInput');
        const submitPinBtn = document.getElementById('submitPin');
        const fileManager = document.getElementById('fileManager');
        const reusableModal = document.getElementById('reusableModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalFooter = document.getElementById('modalFooter');
        
        // Focus pin input on load
        pinInput.focus();
        
        // Get URL parameters
        const urlParams = new Proxy(new URLSearchParams(window.location.search), {
            get: (searchParams, prop) => searchParams.get(prop),
        });
        
        // Auto-submit if PIN is provided in URL
        if (urlParams.pin) {
            pinInput.value = urlParams.pin;
            setTimeout(() => submitPinBtn.click(), 0);
        }
        
        // Global variables
        let currentFolder = null;
        let files = [];
        let allowEdit = false;

        // Utility Functions
        function formatSize(size) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0;
            while (size >= 1024 && i < units.length - 1) {
                size /= 1024;
                i++;
            }
            return `${size.toFixed(2)} ${units[i]}`;
        }

        function calculateFolderSize(folder) {
            let totalSize = 0;
            const queue = [folder];
            while (queue.length > 0) {
                const node = queue.pop();
                if (node.type === 'file') {
                    totalSize += node.size;
                } else if (node.children) {
                    queue.push(...node.children);
                }
            }
            return totalSize;
        }

        function getFileIcon(node) {
            if (node.type === 'folder') {
                return '<i class="bi bi-folder-fill file-icon folder-icon"></i>';
            } else {
                return '<i class="bi bi-file-earmark file-icon file-default-icon"></i>';
            }
        }

        // Render file tree with new design
        function renderFileTree(nodes) {
            fileTree.innerHTML = '';
            
            // Back button for subfolders
            if (currentFolder) {
                const backItem = document.createElement('div');
                backItem.className = 'list-group-item file-item d-flex align-items-center';
                backItem.style.cursor = 'pointer';
                backItem.innerHTML = `
                    <i class="bi bi-arrow-left-circle file-icon" style="color: var(--text-secondary);"></i>
                    <div class="flex-grow-1">
                        <h6 class="mb-1 fw-semibold">.. Back to parent folder</h6>
                        <small class="text-muted">Navigate to parent directory</small>
                    </div>
                `;
                backItem.addEventListener('click', goBack);
                fileTree.appendChild(backItem);
            }

            // Render nodes
            nodes.forEach(node => {
                const div = document.createElement('div');
                div.className = 'list-group-item file-item d-flex align-items-center';
                
                const size = node.type === 'folder' ? calculateFolderSize(node) : node.size;
                const progressInfo = node.progress !== undefined ? ` • Progress: ${node.progress}%` : '';
                
                div.innerHTML = `
                    <div class="form-check me-3">
                        <input class="form-check-input" type="checkbox" id="check_${node.id}" ${node.selected ? 'checked' : ''}>
                    </div>
                    ${getFileIcon(node)}
                    <div class="flex-grow-1">
                        <h6 class="mb-1 fw-semibold file-name" data-node-id="${node.id}">
                            ${node.name}
                        </h6>
                        <small class="text-muted">
                            <i class="bi bi-hdd me-1"></i>Size: ${formatSize(size)}
                            <i class="bi bi-calendar3 ms-2 me-1"></i>Modified: Recently
                            ${progressInfo}
                        </small>
                    </div>
                    <div class="btn-group-mobile">
                        ${node.type === 'folder' ? `
                            <button class="btn btn-outline-light btn-sm" title="Open Folder" onclick="openFolder(findNodeById('${node.id}'))">
                                <i class="bi bi-folder2-open"></i><span class="ms-1 d-none d-sm-inline">Open</span>
                            </button>
                        ` : ''}
                        ${allowEdit ? `
                            <button class="btn btn-outline-secondary btn-sm" title="Rename" onclick="openEditFileNameModal(findNodeById('${node.id}'))">
                                <i class="bi bi-pencil-square"></i><span class="ms-1 d-none d-sm-inline">Rename</span>
                            </button>
                        ` : ''}
                    </div>
                `;

                // Add event listeners
                const checkbox = div.querySelector('.form-check-input');
                const fileName = div.querySelector('.file-name');
                
                checkbox.addEventListener('change', () => toggleFile(node));
                
                if (node.type === 'folder') {
                    fileName.style.cursor = 'pointer';
                    fileName.addEventListener('click', () => openFolder(node));
                    
                    // Handle folder checkbox states
                    if (areAllChildrenSelected(node)) {
                        checkbox.checked = true;
                        checkbox.indeterminate = false;
                    } else if (areSomeChildrenSelected(node)) {
                        checkbox.checked = false;
                        checkbox.indeterminate = true;
                    }
                }

                fileTree.appendChild(div);
            });
            
            updateSelectAllButtonText();
            updateSelectEverythingButtonText();
        }

        // Helper function to find node by ID
        function findNodeById(id) {
            function searchNodes(nodes) {
                for (const node of nodes) {
                    if (node.id === id) return node;
                    if (node.children) {
                        const found = searchNodes(node.children);
                        if (found) return found;
                    }
                }
                return null;
            }
            return searchNodes(files);
        }

        // Folder and file selection logic
        function areAllChildrenSelected(folder) {
            return folder.children.every(child => 
                child.type === 'folder' ? areAllChildrenSelected(child) : child.selected
            );
        }

        function areSomeChildrenSelected(folder) {
            return folder.children.some(child => 
                child.type === 'folder' ? areSomeChildrenSelected(child) : child.selected
            );
        }

        function toggleFile(node) {
            if (node.type === 'folder') {
                const isSelected = !areAllChildrenSelected(node);
                toggleFolder(node, isSelected);
            } else {
                node.selected = !node.selected;
            }
            updateParentFolders(node);
            updateStats();
            renderFileTree(currentFolder ? currentFolder.children : files);
        }

        function toggleFolder(folder, isSelected) {
            const queue = [folder];
            while (queue.length > 0) {
                const node = queue.pop();
                if (node.type === 'file') {
                    node.selected = isSelected;
                } else if (node.children) {
                    node.selected = isSelected;
                    queue.push(...node.children);
                }
            }
        }

        function updateParentFolders(node) {
            let parent = findParent(files[0], node.id);
            while (parent) {
                parent.selected = areAllChildrenSelected(parent);
                parent = findParent(files[0], parent.id);
            }
        }

        function findParent(root, id) {
            if (root.children) {
                for (const child of root.children) {
                    if (child.id === id) return root;
                    const found = findParent(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // Statistics and progress
        function updateStats() {
            const stats = calculateStats(files);
            selectedCount.textContent = stats.selectedCount;
            totalCount.textContent = stats.totalCount;
            selectedSize.textContent = formatSize(stats.selectedSize);
            totalSize.textContent = formatSize(stats.totalSize);
            
            const progress = stats.totalCount > 0 ? Math.round((stats.selectedCount / stats.totalCount) * 100) : 0;
            selectionProgress.textContent = `${progress}%`;
        }

        function calculateStats(nodes) {
            let selectedCount = 0, totalCount = 0, selectedSize = 0, totalSize = 0;
            const queue = [...nodes];
            
            while (queue.length > 0) {
                const node = queue.pop();
                if (node.type === 'file') {
                    totalCount++;
                    totalSize += node.size;
                    if (node.selected) {
                        selectedCount++;
                        selectedSize += node.size;
                    }
                }
                if (node.children) {
                    queue.push(...node.children);
                }
            }
            return { selectedCount, totalCount, selectedSize, totalSize };
        }

        // Navigation functions
        function openFolder(folder) {
            currentFolder = folder;
            renderFileTree(folder.children);
            updateStats();
        }

        function goBack() {
            if (currentFolder) {
                const parent = findParent(files[0], currentFolder.id);
                currentFolder = parent || null;
                renderFileTree(currentFolder ? currentFolder.children : files);
                updateStats();
            }
        }

        // Selection functions
        function selectAll() {
            const nodes = currentFolder ? currentFolder.children : files;
            const allSelected = nodes.every(node => 
                node.type === 'folder' ? areAllChildrenSelected(node) : node.selected
            );
            
            nodes.forEach(node => {
                if (node.type === 'folder') {
                    toggleFolder(node, !allSelected);
                } else {
                    node.selected = !allSelected;
                }
            });
            updateStats();
            renderFileTree(nodes);
            updateSelectAllButtonText();
        }

        function invertSelection() {
            const nodes = currentFolder ? currentFolder.children : files;
            nodes.forEach(node => {
                if (node.type === 'folder') {
                    invertFolderSelection(node);
                } else {
                    node.selected = !node.selected;
                }
            });
            updateStats();
            renderFileTree(nodes);
        }

        function invertFolderSelection(folder) {
            if (folder.children) {
                folder.children.forEach(child => {
                    if (child.type === 'folder') {
                        invertFolderSelection(child);
                    } else {
                        child.selected = !child.selected;
                    }
                });
            }
        }

        function selectEverything() {
            const allSelected = files.every(node => 
                node.type === 'folder' ? areAllChildrenSelected(node) : node.selected
            );
            
            function recursiveSelect(nodes, select) {
                nodes.forEach(node => {
                    if (node.type === 'folder') {
                        node.selected = select;
                        if (node.children) {
                            recursiveSelect(node.children, select);
                        }
                    } else {
                        node.selected = select;
                    }
                });
            }
            
            recursiveSelect(files, !allSelected);
            updateStats();
            renderFileTree(currentFolder ? currentFolder.children : files);
            updateSelectEverythingButtonText();
        }

        // Button text updates
        function updateSelectAllButtonText() {
            const nodes = currentFolder ? currentFolder.children : files;
            const allSelected = nodes.every(node => 
                node.type === 'folder' ? areAllChildrenSelected(node) : node.selected
            );
            selectAllBtn.innerHTML = allSelected 
                ? '<i class="bi bi-square me-1"></i>Deselect All' 
                : '<i class="bi bi-check-square me-1"></i>Select All';
        }

        function updateSelectEverythingButtonText() {
            const stats = calculateStats(files);
            const allSelected = stats.selectedCount === stats.totalCount && stats.totalCount > 0;
            const btn = document.getElementById('selectEverythingBtn');
            btn.innerHTML = allSelected 
                ? '<i class="bi bi-x-square me-1"></i>Deselect Everything' 
                : '<i class="bi bi-check-all me-1"></i>Select Everything';
        }

        // Modal functions
        function openModal() {
            reusableModal.style.display = 'block';
        }

        function closeModal() {
            reusableModal.style.display = 'none';
        }

        // File name editing
        function openEditFileNameModal(node) {
            modalTitle.textContent = `Rename ${node.type === 'folder' ? 'Folder' : 'File'}`;
            modalBody.innerHTML = `
                <div class="mb-3">
                    <label for="editNameInput" class="form-label">New name:</label>
                    <input type="text" id="editNameInput" class="form-control" value="${node.name}">
                </div>
            `;
            modalFooter.innerHTML = `
                <button id="saveNameBtn" class="btn btn-danger me-2">Save Changes</button>
                <button class="btn btn-outline-secondary" onclick="closeModal()">Cancel</button>
            `;

            const saveNameBtn = document.getElementById('saveNameBtn');
            const editNameInput = document.getElementById('editNameInput');

            saveNameBtn.addEventListener('click', () => {
                const newName = editNameInput.value.trim();
                if (newName && newName !== node.name) {
                    // Handle rename logic here
                    node.name = newName;
                    renderFileTree(currentFolder ? currentFolder.children : files);
                    closeModal();
                }
            });

            editNameInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') saveNameBtn.click();
            });

            openModal();
            editNameInput.select();
        }

        // Submission
        function submitData() {
            const stats = calculateStats(files);
            if (stats.selectedCount === 0) {
                modalTitle.textContent = 'No Files Selected';
                modalBody.innerHTML = '<p class="text-muted">Please select at least one file to download.</p>';
                modalFooter.innerHTML = '<button class="btn btn-outline-secondary" onclick="closeModal()">OK</button>';
                openModal();
                return;
            }

            modalTitle.textContent = 'Processing Selection...';
            modalBody.innerHTML = `
                <div class="text-center">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p>Submitting ${stats.selectedCount} file(s)...</p>
                </div>
            `;
            modalFooter.innerHTML = '';
            openModal();

            const requestUrl = `/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=selection`;
            fetch(requestUrl, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(files) 
            }).then(response => {
                if (response.ok) {
                    modalTitle.textContent = 'Success!';
                    modalBody.innerHTML = `
                        <div class="text-center">
                            <i class="bi bi-check-circle text-success" style="font-size: 3rem;"></i>
                            <p class="mt-3">Your selection has been submitted successfully!</p>
                            <p class="text-muted">The download will start shortly.</p>
                        </div>
                    `;
                } else {
                    modalTitle.textContent = 'Error';
                    modalBody.innerHTML = `
                        <div class="text-center">
                            <i class="bi bi-x-circle text-danger" style="font-size: 3rem;"></i>
                            <p class="mt-3">Failed to submit selection.</p>
                            <p class="text-muted">Please try again.</p>
                        </div>
                    `;
                }
                modalFooter.innerHTML = '<button class="btn btn-danger" onclick="closeModal()">Close</button>';
            }).catch(error => {
                modalTitle.textContent = 'Connection Error';
                modalBody.innerHTML = `
                    <div class="text-center">
                        <i class="bi bi-wifi-off text-warning" style="font-size: 3rem;"></i>
                        <p class="mt-3">Connection failed.</p>
                        <p class="text-muted">${error.message}</p>
                    </div>
                `;
                modalFooter.innerHTML = '<button class="btn btn-danger" onclick="closeModal()">Close</button>';
            });
        }

        // PIN submission
        function handleSubmitPin() {
            console.log('PIN submission started'); // Debug log
            pinInput.blur();
            
            if (!pinInput.value.trim()) {
                modalTitle.textContent = 'PIN Required';
                modalBody.innerHTML = '<p class="text-muted">Please enter the PIN to continue.</p>';
                modalFooter.innerHTML = '<button class="btn btn-outline-secondary" onclick="closeModal()">OK</button>';
                openModal();
                return;
            }
            
            if (!urlParams.gid) {
                modalTitle.textContent = 'Missing Parameter';
                modalBody.innerHTML = '<p class="text-muted">The torrent ID (gid) is missing from the URL.</p>';
                modalFooter.innerHTML = '<button class="btn btn-outline-secondary" onclick="closeModal()">OK</button>';
                openModal();
                return;
            }

            // Show loading state
            modalTitle.textContent = 'Connecting...';
            modalBody.innerHTML = `
                <div class="text-center">
                    <div class="spinner-border text-primary mb-3" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p>Validating PIN and fetching torrent files...</p>
                </div>
            `;
            modalFooter.innerHTML = '';
            openModal();

            const requestUrl = `/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=get`;
            console.log('Making request to:', requestUrl); // Debug log
            
            fetch(requestUrl)
                .then(response => {
                    console.log('Response status:', response.status); // Debug log
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    return response.json();
                })
                .then(data => {
                    console.log('Response data:', data); // Debug log
                    closeModal(); // Close loading modal
                    
                    if (data.error) {
                        modalTitle.textContent = data.error;
                        modalBody.innerHTML = `<p class="text-muted">${data.message}</p>`;
                        modalFooter.innerHTML = '<button class="btn btn-danger" onclick="closeModal()">Retry</button>';
                        openModal();
                    } else {
                        files = data.files;
                        allowEdit = data.engine === "qbittorrent";
                        
                        // Smooth transition
                        pinEntry.classList.add('fadeOut');
                        setTimeout(() => {
                            pinEntry.style.display = 'none';
                            fileManager.classList.remove('d-none');
                            renderFileTree(files);
                            updateStats();
                        }, 500);
                    }
                })
                .catch(error => {
                    console.error('PIN submission error:', error); // Debug log
                    closeModal(); // Close loading modal
                    modalTitle.textContent = 'Connection Error';
                    modalBody.innerHTML = `<p class="text-muted">Failed to connect to server: ${error.message}</p>`;
                    modalFooter.innerHTML = '<button class="btn btn-danger" onclick="closeModal()">Retry</button>';
                    openModal();
                });
        }

        // Event Listeners
        pinInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSubmitPin();
        });

        submitPinBtn.addEventListener('click', handleSubmitPin);
        document.getElementById('selectAllBtn').addEventListener('click', selectAll);
        document.getElementById('invertSelectionBtn').addEventListener('click', invertSelection);
        document.getElementById('selectEverythingBtn').addEventListener('click', selectEverything);
        document.getElementById('submitBtn').addEventListener('click', submitData);

        // Close modal when clicking outside
        reusableModal.addEventListener('click', (event) => {
            if (event.target === reusableModal) {
                closeModal();
            }
        });

        // Expose functions globally for onclick handlers
        window.openFolder = openFolder;
        window.findNodeById = findNodeById;
        window.openEditFileNameModal = openEditFileNameModal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
